server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _ "";

    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Vite base: /a-star/ — статика лежит в /assets/, а не в /a-star/assets/
    location ^~ /a-star/assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    location /a-star/ {
        try_files $uri $uri/ /index.html;
    }

    location = / {
        return 302 /a-star/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
